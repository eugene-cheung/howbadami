# Render Blueprint: https://render.com/docs/infrastructure-as-code
# New → Blueprint → connect this repo. Free web services sleep after idle; first request may be slow.
#
# After first deploy, set environment variables in the Render dashboard:
#   CORS_ORIGINS — your frontend origin(s), comma-separated, e.g. https://your-app.vercel.app
services:
  - type: web
    name: howbadami-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        sync: false
